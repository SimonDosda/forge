services:
  golem:
    build: .
    container_name: golem
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    # The forge UI is HTTP on 8765. Outbound bot traffic doesn't need this open.
    # Uncomment to reach the UI via SSH tunnel (ssh -L 8765:127.0.0.1:8765 vps):
    # ports:
    #   - "127.0.0.1:8765:8765"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
