services:
  golem:
    build: .
    container_name: golem
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    # The forge UI is HTTP on 8765. Outbound bot traffic doesn't need this open.
    # Expose only localhost on the host so the SSH tunnel can forward it securely.
    ports:
      - "127.0.0.1:8765:8765"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
