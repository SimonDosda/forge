<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Garden Bot Admin</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 880px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  h1 { margin-bottom: 0; }
  h2 { margin-top: 2rem; border-bottom: 1px solid #ddd; padding-bottom: .25rem; }
  section { margin-bottom: 1.5rem; }
  .row { display: flex; gap: .5rem; margin: .25rem 0; align-items: center; }
  .row label { width: 11rem; font-family: ui-monospace, monospace; font-size: .9rem; }
  .row input { flex: 1; padding: .35rem .5rem; font-family: ui-monospace, monospace; font-size: .9rem; border: 1px solid #ccc; border-radius: 4px; }
  button { padding: .4rem .8rem; border: 1px solid #2a7d4f; background: #2a7d4f; color: white; border-radius: 4px; cursor: pointer; font-size: .9rem; }
  button:hover { background: #226240; }
  button.secondary { background: #f0f0f0; color: #222; border-color: #ccc; }
  button.secondary:hover { background: #e0e0e0; }
  pre { background: #f5f5f5; padding: .75rem; border-radius: 4px; overflow-x: auto; font-size: .8rem; max-height: 360px; }
  .updates details { border: 1px solid #eee; border-radius: 4px; padding: .35rem .6rem; margin-bottom: .35rem; background: #fafafa; }
  .updates details[open] { background: #fff; }
  .updates summary { cursor: pointer; font-size: .9rem; list-style: none; }
  .updates summary::-webkit-details-marker { display: none; }
  .updates summary::before { content: "▸ "; color: #888; }
  .updates details[open] summary::before { content: "▾ "; }
  .updates summary .meta { color: #888; font-size: .8rem; margin-right: .4rem; }
  .updates summary .sender { font-weight: 600; margin-right: .3rem; }
  .updates pre { margin-top: .4rem; font-size: .75rem; max-height: 220px; }
  .ok { color: #2a7d4f; font-weight: 600; }
  .fail { color: #c33; font-weight: 600; }
  .muted { color: #666; font-size: .85rem; }
  .skill-card { border: 1px solid #ddd; border-radius: 4px; padding: .75rem; margin-bottom: .75rem; }
  .skill-card h3 { margin: 0 0 .25rem 0; font-size: 1rem; }
</style>
</head>
<body>
<h1>🌱 Garden Bot Admin</h1>
<p class="muted">Configure secrets and verify each integration. Bind 127.0.0.1 only.</p>

<section>
  <h2>.env configuration</h2>
  <div id="env-fields"></div>
  <div class="row">
    <button id="env-save">Save</button>
    <button id="env-reload" class="secondary">Reload</button>
    <span id="env-status" class="muted"></span>
  </div>
</section>

<section>
  <h2>Telegram</h2>
  <div class="row">
    <button id="tg-me">Verify token (getMe)</button>
    <button id="tg-updates" class="secondary">Get recent updates</button>
  </div>
  <div class="row">
    <input id="tg-text" placeholder="message to send" value="Hello from the garden bot 🌱" />
    <button id="tg-send">Send</button>
  </div>
  <div id="tg-out"></div>
</section>

<section>
  <h2>Notion</h2>
  <div class="row">
    <button id="notion-check">Check connection</button>
  </div>
  <pre id="notion-out"></pre>
</section>

<section>
  <h2>Mistral</h2>
  <div class="row">
    <input id="mistral-text" placeholder="prompt to send" value="Reply with the single word: pong" />
    <button id="mistral-check">Chat</button>
  </div>
  <pre id="mistral-out"></pre>
</section>

<section>
  <h2>Skills</h2>
  <div id="skills-list"></div>
</section>

<script>
const $ = (id) => document.getElementById(id);
const escapeHtml = (s) => String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const show = (el, data, ok = true) => {
  if (el.tagName === "DIV") {
    el.innerHTML = "";
    const pre = document.createElement("pre");
    pre.textContent = JSON.stringify(data, null, 2);
    if (!ok) pre.style.color = "#c33";
    el.appendChild(pre);
  } else {
    el.textContent = JSON.stringify(data, null, 2);
    el.style.color = ok ? "" : "#c33";
  }
};
const renderUpdates = (el, data) => {
  el.innerHTML = "";
  if (!data?.ok) { show(el, data, false); return; }
  const updates = data.result || [];
  if (updates.length === 0) {
    el.innerHTML = '<p class="muted">No recent messages. Send something to your bot first.</p>';
    return;
  }
  const wrap = document.createElement("div");
  wrap.className = "updates";
  for (const u of updates) {
    const m = u.message || u.edited_message || u.channel_post || {};
    const sender = m.from?.username ? "@" + m.from.username : (m.from?.first_name || "?");
    const date = m.date ? new Date(m.date * 1000).toLocaleString() : "";
    const text = m.text ?? m.caption ?? "[non-text update]";
    const det = document.createElement("details");
    det.innerHTML =
      `<summary><span class="meta">${escapeHtml(date)}</span>` +
      `<span class="sender">${escapeHtml(sender)}</span>` +
      `${escapeHtml(text)}</summary>`;
    const pre = document.createElement("pre");
    pre.textContent = JSON.stringify(u, null, 2);
    det.appendChild(pre);
    wrap.appendChild(det);
  }
  el.appendChild(wrap);
};
const api = async (method, url, body) => {
  const res = await fetch(url, {
    method,
    headers: body ? { "Content-Type": "application/json" } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, data };
};

async function loadEnv() {
  const { data } = await api("GET", "/api/env");
  const container = $("env-fields");
  container.innerHTML = "";
  const keys = ["TELEGRAM_TOKEN", "TELEGRAM_CHAT_ID", "MISTRAL_API_KEY",
                "NOTION_TOKEN", "NOTION_DATABASE_ID",
                "LATITUDE", "LONGITUDE", "BRIEFING_HOUR"];
  for (const k of keys) {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `<label>${k}</label><input data-key="${k}" value="${data[k] ?? ''}" />`;
    container.appendChild(row);
  }
  $("env-status").textContent = `loaded ${Object.keys(data).length} keys`;
}

async function saveEnv() {
  const inputs = document.querySelectorAll("#env-fields input[data-key]");
  const values = {};
  for (const i of inputs) values[i.dataset.key] = i.value;
  const { ok } = await api("PUT", "/api/env", values);
  $("env-status").textContent = ok ? "saved ✓" : "save failed";
  $("env-status").className = ok ? "ok" : "fail";
}

$("env-save").onclick = saveEnv;
$("env-reload").onclick = loadEnv;

$("tg-me").onclick = async () => {
  const { data, ok } = await api("GET", "/api/checks/telegram/me");
  show($("tg-out"), data, ok);
};
$("tg-updates").onclick = async () => {
  const { data, ok } = await api("GET", "/api/checks/telegram/updates");
  if (ok) renderUpdates($("tg-out"), data);
  else show($("tg-out"), data, false);
};
$("tg-send").onclick = async () => {
  const { data, ok } = await api("POST", "/api/checks/telegram/send", { text: $("tg-text").value });
  show($("tg-out"), data, ok);
};

$("notion-check").onclick = async () => {
  const { data, ok } = await api("GET", "/api/checks/notion");
  show($("notion-out"), data, ok);
};

$("mistral-check").onclick = async () => {
  const { data, ok } = await api("POST", "/api/checks/mistral", { text: $("mistral-text").value });
  show($("mistral-out"), data, ok);
};

async function loadSkills() {
  const { data } = await api("GET", "/api/checks/skills");
  const container = $("skills-list");
  container.innerHTML = "";
  for (const skill of data) {
    const card = document.createElement("div");
    card.className = "skill-card";
    card.innerHTML = `<h3>${skill.name}</h3><div class="muted">${skill.description}</div>`;
    for (const action of skill.actions) {
      const props = action.parameters?.properties ?? {};
      const inputs = Object.keys(props).map(p => `<input data-param="${p}" placeholder="${p}" />`).join("");
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `<label>${action.name}</label>${inputs}<button data-skill="${skill.name}" data-action="${action.name}">Run</button>`;
      card.appendChild(row);
      const out = document.createElement("pre");
      card.appendChild(out);
      row.querySelector("button").onclick = async (e) => {
        const params = {};
        for (const i of row.querySelectorAll("input[data-param]")) {
          const v = i.value;
          if (v === "") continue;
          params[i.dataset.param] = isNaN(Number(v)) ? v : Number(v);
        }
        const { data, ok } = await api(
          "POST",
          `/api/checks/skills/${skill.name}/${action.name}`,
          params,
        );
        show(out, data, ok);
      };
    }
    container.appendChild(card);
  }
}

loadEnv();
loadSkills();
</script>
</body>
</html>
